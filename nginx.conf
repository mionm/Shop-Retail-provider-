events {
    worker_connections 1024;
}

http {
    # Allow image-bearing JSON requests from the UI.
    # The UI caps uploads at 10MB (ui/src/config/config.ts), and base64 encoding
    # inflates payload size by ~33%. 20m leaves comfortable headroom.
    client_max_body_size 20m;

    upstream frontend {
        server frontend:3000;
    }
    
    upstream backend {
        server chain-server:8009;
    }
    
    server {
        listen 80;
        
        # Frontend (now includes WebSocket directives)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WS handling
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # Backend API (keep these, in case backend also has WebSockets)
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            # WS Handling
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}